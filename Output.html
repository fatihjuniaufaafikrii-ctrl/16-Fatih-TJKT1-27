<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OUTPUT - FATIH</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --ai-primary: #00d2ff;
    --ai-secondary: #3a7bd5;
    --glass-bg: rgba(15, 20, 30, 0.6);
    --text-main: #f8f9fa;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #030508; /* Lebih gelap untuk kontras aurora */
    color: var(--text-main);
    overflow: hidden;
    position: relative;
}

/* =========================================
   BACKGROUND ANIMATION: TECH GRID & AURORA 
   ========================================= */

/* 1. Tech Grid Bergerak */
.bg-grid {
    position: absolute;
    inset: -50px; /* Lebihi batas layar agar animasi mulus */
    background-image: 
        linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: -2;
    animation: panGrid 20s linear infinite;
    pointer-events: none;
}

@keyframes panGrid {
    0% { transform: translateY(0); }
    100% { transform: translateY(-40px); }
}

/* 2. Aurora Ambient Glow */
.ambient-glow {
    position: absolute;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    pointer-events: none;
}

.glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(90px); /* Kunci untuk membuat efek halus */
    opacity: 0.5;
    mix-blend-mode: screen;
}

.glow-1 {
    width: 400px; height: 400px;
    background: rgba(0, 210, 255, 0.4);
    top: -10%; left: -10%;
    animation: drift1 20s infinite alternate ease-in-out;
}

.glow-2 {
    width: 500px; height: 500px;
    background: rgba(58, 123, 213, 0.3);
    bottom: -20%; right: -10%;
    animation: drift2 25s infinite alternate-reverse ease-in-out;
}

.glow-3 {
    width: 350px; height: 350px;
    background: rgba(122, 0, 255, 0.2);
    top: 30%; left: 30%;
    animation: drift3 30s infinite alternate ease-in-out;
}

@keyframes drift1 { 
    0% { transform: translate(0, 0) scale(1); } 
    100% { transform: translate(15vw, 15vh) scale(1.2); } 
}
@keyframes drift2 { 
    0% { transform: translate(0, 0) scale(1); } 
    100% { transform: translate(-15vw, -10vh) scale(1.1); } 
}
@keyframes drift3 { 
    0% { transform: translate(0, 0) scale(1); } 
    100% { transform: translate(10vw, -15vh) scale(1.3); } 
}

/* =========================================
   UI CARD & CONTENT 
   ========================================= */

.card {
    width: 90%;
    max-width: 400px;
    padding: 40px 30px;
    border-radius: 32px;
    text-align: center;
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), inset 0 2px 20px rgba(255,255,255,0.05);
    
    animation: 
        cardEnter 1s ease-out forwards,
        magneticFloat 6s ease-in-out infinite alternate;
}

@keyframes cardEnter {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes magneticFloat {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-8px); }
}

h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    background: linear-gradient(to right, var(--ai-primary) 20%, #ffffff 40%, #ffffff 60%, var(--ai-primary) 80%);
    background-size: 200% auto;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: textShine 4s linear infinite;
}

@keyframes textShine {
    to { background-position: 200% center; }
}

p {
    font-size: 14px;
    font-weight: 300;
    color: #94a3b8;
    margin-bottom: 30px;
}

.menu-btn {
    width: 100%;
    margin: 10px 0;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    background: rgba(255, 255, 255, 0.03);
    color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    
    opacity: 0;
    transform: translateY(15px);
    animation: btnCascade 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    transition: background 0.3s, border-color 0.3s, transform 0.3s, box-shadow 0.3s;
}

.menu-btn:nth-of-type(1) { animation-delay: 0.3s; }
.menu-btn:nth-of-type(2) { animation-delay: 0.4s; }
.menu-btn:nth-of-type(3) { animation-delay: 0.5s; }
.menu-btn:nth-of-type(4) { animation-delay: 0.6s; }

@keyframes btnCascade {
    to { opacity: 1; transform: translateY(0); }
}

.menu-btn:hover {
    background: rgba(0, 210, 255, 0.1);
    border-color: var(--ai-primary);
    transform: translateX(5px) scale(1.02);
    box-shadow: -5px 0 15px rgba(0, 210, 255, 0.2);
}

.menu-btn::after {
    content: '→';
    opacity: 0;
    transition: 0.3s;
}

.menu-btn:hover::after {
    opacity: 1;
}

.footer {
    margin-top: 25px;
    font-size: 11px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0;
    animation: btnCascade 0.6s forwards;
    animation-delay: 0.8s;
}

.back-btn {
    position: fixed;
    bottom: 30px;
    left: 30px;
    padding: 12px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: 0.3s;
    opacity: 0;
    animation: btnCascade 0.6s forwards;
    animation-delay: 1s;
    z-index: 10;
}

.back-btn:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-2px);
}

@media (max-width: 480px) {
    .card { padding: 30px 20px; }
    h1 { font-size: 24px; }
}
</style>

function tampilJurusan() { alert("Jurusan: Teknik Jaringan Komputer Dan Telekomunikasi"); }
function tampilAlamat() { alert("Alamat: Kemutug Lor RT 4 RW 2, Banyumas, Jawa Tengah"); }
</script>
</head>

<body>

<div class="bg-grid"></div>
<div class="ambient-glow">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="glow glow-3"></div>
</div>

<div class="card">
    <h1>Fatih</h1>
    <p>Personal Identity</p>

    <button class="menu-btn" onclick="tampilNama()">IDENTITAS</button>
    <button class="menu-btn" onclick="tampilSekolah()">INSTITUSI</button>
    <button class="menu-btn" onclick="tampilJurusan()">KEAHLIAN</button>
    <button class="menu-btn" onclick="tampilAlamat()">LOKASI</button>

    <div class="footer">
        Digital Profile • 2026
    </div>
</div>

<a href="Index.html" class="back-btn">← Kembali ke Index</a>

</body>
</html>
